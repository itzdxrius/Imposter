<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Imposter/vote</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css')}}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/vote.css')}}">
    </head>
    <body>
        <div class="mask-silhouette vote-mask">
            <span class="mask-image mask-left"></span>
            <span class="mask-image mask-right"></span>
        </div>
        <main class="page-content vote-content">
            <h1 class="game-title">Imposter</h1>
            <div class="table-page-content">
                <div class="table-page-heading">
                    <p class="section-subtitle vote-subtitle">Who's Lying?</p>
                    <p class="header-text vote-header"> Cast your vote</p>
                </div>
                <div class="player-table-area">
                    <table class="player-table vote-table">
                        <tbody id="vote-list">
                            {% for player in players %}
                                <tr>
                                    <td><img class="player-picture" src="{{ player.user.picture }}" alt="Profile Picture"></td>
                                    <td class="section-subtitle">{{ player.name }}</td>
                                    <td><button class="primary-button vote-button" data-player-id="{{ player.id }}">Vote</button></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                <div class="table-bottom-content">
                    <button id="skip-button" class="primary-button ">Vote to Skip</button>
                <p id="vote-status"></p>
                </div>
            </div>
        </main>
        <script>const ROUND_ID = "{{ round.id }}";</script>
        <script src="{{ url_for('static', filename='js/vote.js')}}"></script>
    </body>
</html>
